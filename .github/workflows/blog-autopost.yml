name: Auto-publish blog post

# Fully automated: invents a topic, writes the article, pulls images, and
# publishes to Sanity — no human in the loop. See scripts/generate-post.mjs.
on:
  schedule:
    # 09:00 UTC every Monday. Edit the cron to change cadence (https://crontab.guru).
    - cron: '0 9 * * 1'
  workflow_dispatch: # allow manual runs from the Actions tab
    inputs:
      dry_run:
        description: 'Generate without publishing'
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate and publish
        run: node scripts/generate-post.mjs ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # Optional overrides (defaults baked into the script):
          # SANITY_PROJECT_ID, SANITY_DATASET, BLOG_MODEL
